name: Lancement collecte.py chaque minute

on:
  schedule:
    - cron: "*/1 * * * *"   
  workflow_dispatch:

jobs:
  run-collecte:
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du dépôt
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Activation de l'environnement virtuel et exécution du script
        run: |
          source env/.ibm-extract/bin/activate
          python collecte.py
